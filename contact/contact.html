<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="../imagenes/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" class="nav--link" href="../index.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">


  <header>
    <nav class="nav d-flex justify-content-between align-items-center p-0" id="nav">
      <div>
        <img src="../imagenes/logo.png" class="logo" alt="LOGO">
      </div>
      <div>
        <ul class="nav__lista">
          <li class="nav__item">
            <a class="nav--link" href="../index.html">Inicio</a>
          </li>
          <li class="nav__item">
            <a class="nav--link" href="../index.html#proyectos">Proyectos</a>
          </li>
          <li class="nav__item">
            <a class="nav--link" href="../index.html#educacion">Experiencia</a>
          </li>
          <li class="nav__item">
            <a class="nav--link" href="../index.html#certificados">Certificados</a>
          </li>
          <li class="nav__item">
            <a class="nav--link" href="#contactos">Contacto</a>
          </li>
        </ul>
      </div>
    </nav>
  </header>



  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow">
          <div class="card-body">
            <h3 class="text-center mb-4">Contáctame</h3>

            <form id="contactForm">
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea class="form-control" id="mensaje" rows="4" required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Enviar mensaje
              </button>

              <p id="respuesta" class="text-center mt-3"></p>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
