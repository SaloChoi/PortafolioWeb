  <body>
    <header>
    <nav class="nav navbar navbar-expand-lg p-0 " id="nav">

      <!-- Logo -->

      <button class="navbar-toggler" type="button" 
              data-bs-toggle="collapse" 
              data-bs-target="#menuPrincipal"

      <div class="collapse navbar-collapse" id="menuPrincipal">

    <div class="container">
<div class="contact_section">
  <div class="contact_glass">

    <h2>Contáctame</h2>
    <form id="contactForm" class="contact_form">

      <div class="input_group">
        <label class="fw-bolder" for="nombre">Nombre* :</label>
        <input type="text" id="nombre" name="name" required />
      </div>

      <div class="input_group">
        <label for="email">Email* :</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="input_group">
        <label for="mensaje">Mensaje* :</label>
        <textarea id="mensaje" name="message" rows="4" required></textarea>
      </div>

      <button type="submit" class="contact_button">
        Enviar mensaje
      </button>

      <p id="respuesta"></p>

    </form>
  </div>
</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function () {
        emailjs.init("tuaoVst0Hsv-wCGwY");
      })();
